# Multiagent Story Generation System - Configuration
# Phase 0: Foundation + Phase 1: Preprocessing

openai:
  model: "gpt-5"  # Default model for all agents
  reasoning_effort: "minimal"  # Default reasoning effort level: minimal, low, medium, high
  # temperature: 1.0  # GPT-5 with structured outputs only supports 1 (omit to use default)
  # max_tokens: null  # No limit - let GPT-5 decide output length
  # api_key loaded from .env file (OPENAI_API_KEY)

mta:
  server_root: "z:\\More games\\GTA San Andreas\\MTA-SA1.6\\server"
  resource_path: "mods/deathmatch/resources/sv2l"
  server_executable: "MTA Server.exe"
  client_shortcut: "Multi Theft Auto.exe - Shortcut.lnk"
  client_executable: "Multi Theft Auto.exe"
  server_log: "mods/deathmatch/logs/server.log"
  client_log: "../MTA/logs/clientscript.log"
  startup_wait_seconds: 60
  shutdown_wait_seconds: 3

paths:
  simulation_environment_capabilities: "data/simulation_environment_capabilities.json"
  game_capabilities_source: "../sv2l/simulation_environment_capabilities.json"
  game_capabilities_concept: "data/cache/game_capabilities_concept.json"
  game_capabilities_full_indexed: "data/cache/game_capabilities_full_indexed.json"
  output_dir: "output"
  logs_dir: "logs"
  cache_dir: "data/cache"
  reference_graphs: "examples/reference_graphs"
  documentation: "data/documentation"

# Phase 1: Preprocessing agents configuration
preprocessing:
  # Whether to include episode summaries by default
  include_episode_summaries: true

  # Skin categorization agent
  skin_categorization:
    model: "gpt-5"  # Large context window for all 249 skins
    # temperature: 1.0  # GPT-5 structured outputs only supports 1 (omit for default)
    # max_tokens: null  # No limit - GPT-5 decides

  # Episode summarization agent
  episode_summarization:
    model: "gpt-5"  # Large context window for all 13 episodes
    # temperature: 1.0  # GPT-5 structured outputs only supports 1 (omit for default)
    # max_tokens: null  # No limit - GPT-5 decides

# Phase 3: Detail workflow configuration
detail:
  # Whether to expand scenes in parallel using ThreadPoolExecutor
  parallel_expansion: true

  # Maximum number of scenes to expand concurrently (default: 5)
  # Recommended: 3-5 for optimal balance between speed and API rate limits
  max_parallel_scenes: 5

validation:
  max_attempts: 3
  simulation_timeout_seconds: 14400
  scene_1_max_retries: 2
  require_video_output: false
  # Adaptive timeout settings (smart timeout that tracks action progress)
  no_action_progress_timeout_seconds: 600  # Timeout if no actions execute for this long (stuck detection)
  max_simulation_time_seconds: 14400  # Absolute max time (4 hours - rely on 90s no-progress timeout)
  # Freeze/crash detection settings
  max_server_log_silence_seconds: 600  # Detect freeze after 10 min of no server logs
  client_connect_timeout_seconds: 180  # Max wait for client to connect after server ready (3 min)
  server_ready_timeout_seconds: 180  # Max wait for server to become "ready" after sim start (3 min)
  first_action_timeout_seconds: 600  # Max wait for first action to start after sim start (10 min)
  hung_window_timeout_seconds: 180  # Kill MTA if window is "Not Responding" for this long (3 min)
  process_check_interval: 2  # Check process health every 2 seconds
  error_patterns:
    - "[ErrorHandler] ERROR DETECTED!"
    - "We could not find any valid episodes for the file"
    - "\\[FATAL ERROR\\]"
  success_patterns:
    - "No more graphs to process\\. Shutting down the server\\. story completed successfully"

logging:
  level: "DEBUG"
  format: "json"

# Prompt logging configuration
# Use --save-prompts CLI flag to enable (overrides this setting)
prompt_logging:
  enabled: false  # Disabled by default (enable with --save-prompts flag)
  save_system_prompt: true  # Save system prompts
  save_user_prompt: true  # Save user prompts
  save_response_raw: false  # Save raw LLM responses (use --save-raw-responses flag)
  save_response_parsed: true  # Save parsed responses
  separate_files: true  # Save separate files per agent/iteration

# Batch generation configuration
batch:
  default_output_dir: "batch_output"  # Default output directory for batch runs
  compress_archives: false  # Whether to compress batch outputs to .zip
  max_generation_retries: 3  # Maximum retries for failed generation phases
  max_simulation_retries: 1  # Maximum retries for failed simulations
  simulation_timeout_first: 14400  # Timeout for first simulation attempt (4 hours - rely on 90s no-progress timeout)
  simulation_timeout_retry: 14400  # Timeout for retry attempts (4 hours - rely on 90s no-progress timeout)
  keep_intermediates: true  # Keep intermediate files (scene_detail_agent/, concept_N/)

# Hybrid LLM-directed generation configuration
# Model-agnostic: supports openai, anthropic, ollama, google
llm:
  provider: "anthropic"
  model: "claude-haiku-4-5-20251001"
  temperature: 0.7
  api_key_env: "CLAUDE_API_KEY"
  # base_url: null  # For Ollama: "http://localhost:11434/v1"

# Google Drive integration configuration
google_drive:
  credentials_path: "credentials/google_drive_credentials.json"  # Path to Google Drive credentials
  default_folder_id: null  # Optional default Google Drive folder ID
